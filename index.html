<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCW Tasks">
<meta name="theme-color" content="#1A2332">
<title>SCW Task Manager</title>
<style>
  :root {
    --navy: #1A2332;
    --navy-mid: #223044;
    --navy-light: #2d3f57;
    --gold: #C9A84C;
    --gold-light: #e2c278;
    --gold-pale: #f5e9c8;
    --white: #ffffff;
    --off-white: #f7f8fa;
    --text-primary: #1A2332;
    --text-secondary: #5a6a7e;
    --text-muted: #8a9ab0;
    --red: #d94f4f;
    --red-pale: #fdf0f0;
    --amber: #e8913a;
    --amber-pale: #fef6ed;
    --green: #3aad75;
    --green-pale: #edf8f2;
    --border: #e2e8f0;
    --border-dark: #c8d4e0;
    --shadow-sm: 0 1px 3px rgba(26,35,50,0.08);
    --shadow-md: 0 4px 16px rgba(26,35,50,0.12);
    --shadow-lg: 0 8px 32px rgba(26,35,50,0.18);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--off-white);
    color: var(--text-primary);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--navy);
    padding: 52px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 36px;
    height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    color: var(--navy);
    letter-spacing: -0.5px;
  }
  .brand-text {
    color: var(--white);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .brand-sub {
    color: var(--gold);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: block;
  }
  .add-btn {
    width: 40px;
    height: 40px;
    background: var(--gold);
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    color: var(--navy);
    font-weight: 300;
    line-height: 1;
    transition: transform 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .add-btn:active { transform: scale(0.93); background: var(--gold-light); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-pill {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    display: block;
  }
  .stat-num.urgent { color: #ff7a7a; }
  .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 2px;
    display: block;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    flex: 1;
    padding: 7px 4px;
    border: none;
    background: transparent;
    border-radius: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
    text-align: center;
  }
  .tab-btn.active {
    background: var(--white);
    color: var(--navy);
    box-shadow: var(--shadow-sm);
  }
  .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--gold);
    color: var(--navy);
    border-radius: 10px;
    font-size: 9px;
    font-weight: 800;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .tab-badge.urgent-badge { background: #ff7a7a; color: white; }

  /* ── CONTENT ── */
  .content {
    padding: 16px;
    padding-bottom: 40px;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    margin-top: 4px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .section-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── TASK CARD ── */
  .task-card {
    background: var(--white);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.15s;
    position: relative;
  }
  .task-card:active { box-shadow: var(--shadow-md); }
  .task-card.overdue { border-left: 3px solid var(--red); }
  .task-card.due-today { border-left: 3px solid var(--amber); }
  .task-card.upcoming { border-left: 3px solid var(--green); }
  .task-card.no-date { border-left: 3px solid var(--border-dark); }
  .task-card.done { opacity: 0.45; }

  .card-inner {
    padding: 14px 14px 12px;
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .card-check {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border-dark);
    border-radius: 6px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    background: white;
  }
  .card-check:active { transform: scale(0.88); }
  .task-card.done .card-check {
    background: var(--green);
    border-color: var(--green);
  }
  .task-card.done .card-check::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }
  .card-body { flex: 1; min-width: 0; }
  .card-client {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .task-card.done .card-client { text-decoration: line-through; color: var(--text-muted); }
  .card-task {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .due-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.1px;
  }
  .due-chip.overdue { background: var(--red-pale); color: var(--red); }
  .due-chip.today { background: var(--amber-pale); color: var(--amber); }
  .due-chip.upcoming { background: var(--green-pale); color: var(--green); }
  .due-chip.no-date { background: var(--off-white); color: var(--text-muted); }
  .priority-chip {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .priority-chip.high { background: #fff0f0; color: var(--red); }
  .priority-chip.medium { background: #fff8ed; color: var(--amber); }
  .priority-chip.low { background: var(--green-pale); color: var(--green); }

  .card-actions {
    display: flex;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .card-action-btn {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .card-action-btn:active { background: var(--off-white); }
  .card-action-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .card-action-btn.danger { color: var(--red); }
  .card-action-btn.complete-btn { color: var(--green); }

  .notes-preview {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; line-height: 1.5; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 2px;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-dark);
    background: white;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .filter-chip.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .filter-chip:active { transform: scale(0.96); }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 22, 35, 0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border-dark);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .modal-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--off-white);
    font-size: 18px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .modal-body { padding: 20px; }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    color: var(--text-primary);
    background: white;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--navy);
  }
  .form-textarea { resize: none; height: 80px; line-height: 1.5; }

  .type-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .type-option {
    padding: 10px 6px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
  }
  .type-option:active { transform: scale(0.97); }
  .type-option.selected { border-color: var(--navy); background: var(--navy); }
  .type-option-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .type-option-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); display: block; }
  .type-option.selected .type-option-label { color: white; }

  .priority-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .priority-option {
    padding: 9px 6px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    background: white;
  }
  .priority-option.sel-high { border-color: var(--red); background: var(--red-pale); color: var(--red); }
  .priority-option.sel-medium { border-color: var(--amber); background: var(--amber-pale); color: var(--amber); }
  .priority-option.sel-low { border-color: var(--green); background: var(--green-pale); color: var(--green); }

  .save-btn {
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .save-btn:active { background: var(--navy-mid); }
  .save-btn.loading { opacity: 0.7; pointer-events: none; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    z-index: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: var(--shadow-lg);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success::before { content: '✓  '; }
  .toast.error::before { content: '✕  '; }

  /* ── WEBHOOK STATUS ── */
  .webhook-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--off-white);
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .webhook-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .webhook-status {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .webhook-status.connected { background: var(--green-pale); color: var(--green); }
  .webhook-status.disconnected { background: var(--red-pale); color: var(--red); }

  /* ── SETTINGS ── */
  .settings-icon {
    width: 34px;
    height: 34px;
    border: none;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.15s;
  }
  .settings-icon:active { background: rgba(255,255,255,0.2); }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0 16px;
  }

  .edit-field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── WEBHOOK SETTINGS MODAL ── */
  .webhook-input-wrap { position: relative; }
  .webhook-test-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    cursor: pointer;
  }
  .webhook-test-btn:active { opacity: 0.8; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .detail-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .detail-value { font-size: 13px; color: var(--text-primary); font-weight: 600; text-align: right; }
</style>
</head>
<body>

<!-- APP HEADER -->
<div class="app-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">SC</div>
      <div>
        <span class="brand-text">Task Manager</span>
        <span class="brand-sub">Sean Cohen Wealth</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="settings-icon" onclick="openSettings()">⚙️</button>
      <button class="add-btn" onclick="openAddModal()">+</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-num urgent" id="stat-overdue">0</span>
      <span class="stat-label">Overdue</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="stat-today">0</span>
      <span class="stat-label">Due Today</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" id="stat-open">0</span>
      <span class="stat-label">Open Tasks</span>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('followups', this)">
      Follow-Ups <span class="tab-badge urgent-badge" id="badge-followups">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('doer', this)">
      Doer <span class="tab-badge" id="badge-doer">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('ongoing', this)">
      Ongoing <span class="tab-badge" id="badge-ongoing">0</span>
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

  <!-- FOLLOW-UPS TAB -->
  <div class="tab-content active" id="tab-followups">
    <div class="filter-bar" id="filter-followups">
      <button class="filter-chip active" onclick="setFilter('followups','all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('followups','overdue',this)">Overdue</button>
      <button class="filter-chip" onclick="setFilter('followups','today',this)">Today</button>
      <button class="filter-chip" onclick="setFilter('followups','upcoming',this)">Upcoming</button>
    </div>
    <div id="list-followups"></div>
  </div>

  <!-- DOER TAB -->
  <div class="tab-content" id="tab-doer">
    <div class="filter-bar" id="filter-doer">
      <button class="filter-chip active" onclick="setFilter('doer','all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('doer','overdue',this)">Overdue</button>
      <button class="filter-chip" onclick="setFilter('doer','today',this)">Today</button>
      <button class="filter-chip" onclick="setFilter('doer','upcoming',this)">Upcoming</button>
    </div>
    <div id="list-doer"></div>
  </div>

  <!-- ONGOING TAB -->
  <div class="tab-content" id="tab-ongoing">
    <div class="filter-bar" id="filter-ongoing">
      <button class="filter-chip active" onclick="setFilter('ongoing','all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('ongoing','high',this)">High Priority</button>
      <button class="filter-chip" onclick="setFilter('ongoing','active',this)">Active</button>
    </div>
    <div id="list-ongoing"></div>
  </div>

</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="addModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Task</span>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label class="form-label">Task Type</label>
        <div class="type-selector">
          <div class="type-option selected" data-type="followups" onclick="selectType(this)">
            <span class="type-option-icon">📞</span>
            <span class="type-option-label">Follow-Up</span>
          </div>
          <div class="type-option" data-type="doer" onclick="selectType(this)">
            <span class="type-option-icon">✅</span>
            <span class="type-option-label">Doer</span>
          </div>
          <div class="type-option" data-type="ongoing" onclick="selectType(this)">
            <span class="type-option-icon">📁</span>
            <span class="type-option-label">Ongoing Case</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Client Name</label>
        <input type="text" class="form-input" id="input-client" placeholder="e.g. Laura Swart" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label">Task / Action Required</label>
        <input type="text" class="form-input" id="input-task" placeholder="e.g. Confirm living annuity decision" autocomplete="off">
      </div>

      <div class="edit-field-row">
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" class="form-input" id="input-due">
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <div class="priority-selector">
            <div class="priority-option" data-priority="high" onclick="selectPriority(this)">High</div>
            <div class="priority-option sel-medium" data-priority="medium" onclick="selectPriority(this)">Med</div>
            <div class="priority-option" data-priority="low" onclick="selectPriority(this)">Low</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="input-notes" placeholder="Any context or details..."></textarea>
      </div>

      <button class="save-btn" id="save-btn" onclick="saveTask()">
        <span id="save-btn-text">Save Task</span>
      </button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Zapier Webhook URL</label>
        <div class="webhook-input-wrap">
          <input type="url" class="form-input" id="webhook-url" placeholder="https://hooks.zapier.com/hooks/catch/..." style="padding-right:70px;">
          <button class="webhook-test-btn" onclick="testWebhook()">Test</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:5px;">New tasks will be sent to this URL. Set up a Zap to receive and forward to Google Sheets or email.</div>
      </div>
      <div class="webhook-row">
        <span class="webhook-label">Webhook Status</span>
        <span class="webhook-status disconnected" id="webhook-status-chip">Not configured</span>
      </div>
      <div style="height:1px;background:var(--border);margin:4px 0 16px;"></div>
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input type="text" class="form-input" id="settings-name" placeholder="Sean Cohen">
      </div>
      <button class="save-btn" onclick="saveSettings()">Save Settings</button>
      <button onclick="clearAllData()" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--red);background:white;cursor:pointer;margin-top:10px;">Clear All Tasks</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="detail-title">Task Details</span>
      <button class="modal-close" onclick="closeModal('detailModal')">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let tasks = JSON.parse(localStorage.getItem('scw_tasks') || '[]');
let settings = JSON.parse(localStorage.getItem('scw_settings') || '{"webhookUrl":"","name":"Sean"}');
let currentTab = 'followups';
let activeFilters = { followups: 'all', doer: 'all', ongoing: 'all' };
let editingId = null;
let selectedType = 'followups';
let selectedPriority = 'medium';

// ── UTILS ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function today() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function daysDiff(dateStr) {
  if (!dateStr) return null;
  const due = new Date(dateStr + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((due - now) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return 'No due date';
  const diff = daysDiff(dateStr);
  if (diff < 0) return `${Math.abs(diff)}d overdue`;
  if (diff === 0) return 'Due today';
  if (diff === 1) return 'Due tomorrow';
  if (diff <= 7) return `Due in ${diff} days`;
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
}

function getDateClass(task) {
  if (task.done) return 'no-date';
  if (!task.due) return 'no-date';
  const diff = daysDiff(task.due);
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'due-today';
  return 'upcoming';
}

function getChipClass(task) {
  if (!task.due) return 'no-date';
  const diff = daysDiff(task.due);
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  return 'upcoming';
}

// ── RENDER ──
function render() {
  updateStats();
  updateBadges();
  renderList('followups');
  renderList('doer');
  renderList('ongoing');
}

function filterTasks(type) {
  let list = tasks.filter(t => t.type === type);
  const f = activeFilters[type];
  if (f === 'overdue') list = list.filter(t => !t.done && t.due && daysDiff(t.due) < 0);
  else if (f === 'today') list = list.filter(t => !t.done && t.due && daysDiff(t.due) === 0);
  else if (f === 'upcoming') list = list.filter(t => !t.done && t.due && daysDiff(t.due) > 0);
  else if (f === 'high') list = list.filter(t => t.priority === 'high');
  else if (f === 'active') list = list.filter(t => !t.done);

  // Sort: overdue first, then today, then upcoming, then no date, then done
  list.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const da = a.due ? daysDiff(a.due) : 9999;
    const db = b.due ? daysDiff(b.due) : 9999;
    return da - db;
  });
  return list;
}

function renderList(type) {
  const container = document.getElementById('list-' + type);
  const list = filterTasks(type);

  if (list.length === 0) {
    const labels = { followups: 'follow-ups', doer: 'doer tasks', ongoing: 'ongoing cases' };
    container.innerHTML = `<div class="empty-state">
      <span class="empty-icon">${type === 'followups' ? '📞' : type === 'doer' ? '✅' : '📁'}</span>
      <div class="empty-title">All clear</div>
      <div class="empty-sub">No ${labels[type]} here.<br>Tap + to add one.</div>
    </div>`;
    return;
  }

  container.innerHTML = list.map(t => {
    const dateClass = getDateClass(t);
    const chipClass = getChipClass(t);
    return `<div class="task-card ${dateClass} ${t.done ? 'done' : ''}" id="card-${t.id}">
      <div class="card-inner">
        <div class="card-top">
          <div class="card-check" onclick="toggleDone('${t.id}')"></div>
          <div class="card-body" onclick="openDetail('${t.id}')">
            <div class="card-client">${esc(t.client)}</div>
            <div class="card-task">${esc(t.task)}</div>
            ${t.notes ? `<div class="notes-preview">${esc(t.notes)}</div>` : ''}
          </div>
        </div>
        <div class="card-meta">
          <span class="due-chip ${chipClass}">${formatDate(t.due)}</span>
          ${t.priority !== 'medium' ? `<span class="priority-chip ${t.priority}">${t.priority}</span>` : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="card-action-btn complete-btn" onclick="toggleDone('${t.id}')">
          ${t.done ? '↩ Reopen' : '✓ Done'}
        </button>
        <button class="card-action-btn" onclick="openEdit('${t.id}')">✏️ Edit</button>
        <button class="card-action-btn danger" onclick="deleteTask('${t.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const open = tasks.filter(t => !t.done);
  const overdue = open.filter(t => t.due && daysDiff(t.due) < 0).length;
  const dueToday = open.filter(t => t.due && daysDiff(t.due) === 0).length;
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('stat-today').textContent = dueToday;
  document.getElementById('stat-open').textContent = open.length;
}

function updateBadges() {
  ['followups','doer','ongoing'].forEach(type => {
    const urgent = tasks.filter(t => t.type === type && !t.done && t.due && daysDiff(t.due) <= 0).length;
    const badge = document.getElementById('badge-' + type);
    badge.textContent = urgent;
    badge.style.display = urgent > 0 ? 'inline-flex' : 'none';
    if (type !== 'followups') badge.className = 'tab-badge';
    else badge.className = 'tab-badge' + (urgent > 0 ? ' urgent-badge' : '');
  });
}

// ── TABS ──
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── FILTERS ──
function setFilter(type, filter, btn) {
  activeFilters[type] = filter;
  const bar = document.getElementById('filter-' + type);
  bar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderList(type);
}

// ── ADD MODAL ──
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('save-btn-text').textContent = 'Save Task';
  document.getElementById('edit-id').value = '';
  document.getElementById('input-client').value = '';
  document.getElementById('input-task').value = '';
  document.getElementById('input-due').value = '';
  document.getElementById('input-notes').value = '';

  // Set type to current tab
  document.querySelectorAll('.type-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.type === currentTab);
  });
  selectedType = currentTab;
  selectedPriority = 'medium';
  document.querySelectorAll('.priority-option').forEach(o => {
    o.className = 'priority-option' + (o.dataset.priority === 'medium' ? ' sel-medium' : '');
  });
  openModal('addModal');
  setTimeout(() => document.getElementById('input-client').focus(), 350);
}

function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('save-btn-text').textContent = 'Save Changes';
  document.getElementById('edit-id').value = id;
  document.getElementById('input-client').value = t.client;
  document.getElementById('input-task').value = t.task;
  document.getElementById('input-due').value = t.due || '';
  document.getElementById('input-notes').value = t.notes || '';
  selectedType = t.type;
  selectedPriority = t.priority || 'medium';
  document.querySelectorAll('.type-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.type === t.type);
  });
  document.querySelectorAll('.priority-option').forEach(o => {
    const p = o.dataset.priority;
    o.className = 'priority-option' + (p === selectedPriority ? ` sel-${p}` : '');
  });
  closeModal('detailModal');
  openModal('addModal');
}

function selectType(el) {
  document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
}

function selectPriority(el) {
  selectedPriority = el.dataset.priority;
  document.querySelectorAll('.priority-option').forEach(o => {
    const p = o.dataset.priority;
    o.className = 'priority-option' + (p === selectedPriority ? ` sel-${p}` : '');
  });
}

// ── SAVE ──
async function saveTask() {
  const client = document.getElementById('input-client').value.trim();
  const task = document.getElementById('input-task').value.trim();
  if (!client || !task) { showToast('Client name and task are required', 'error'); return; }

  const btn = document.getElementById('save-btn');
  btn.classList.add('loading');

  const payload = {
    id: editingId || uid(),
    type: selectedType,
    client,
    task,
    due: document.getElementById('input-due').value || null,
    priority: selectedPriority,
    notes: document.getElementById('input-notes').value.trim(),
    done: false,
    created: editingId ? (tasks.find(t => t.id === editingId)?.created || new Date().toISOString()) : new Date().toISOString(),
    updated: new Date().toISOString()
  };

  if (editingId) {
    payload.done = tasks.find(t => t.id === editingId)?.done || false;
    tasks = tasks.map(t => t.id === editingId ? payload : t);
  } else {
    tasks.unshift(payload);
  }

  save();

  // Fire webhook
  if (settings.webhookUrl) {
    try {
      await fetch(settings.webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...payload, action: editingId ? 'updated' : 'created', adviser: settings.name || 'Sean' })
      });
    } catch(e) { /* webhook errors are silent */ }
  }

  btn.classList.remove('loading');
  closeModal('addModal');
  render();
  showToast(editingId ? 'Task updated' : 'Task saved');
}

// ── DONE / DELETE ──
function toggleDone(id) {
  tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done, updated: new Date().toISOString() } : t);
  save();
  render();
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
  showToast('Task deleted');
}

// ── DETAIL ──
function openDetail(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const typeLabels = { followups: 'Follow-Up', doer: 'Doer Task', ongoing: 'Ongoing Case' };
  document.getElementById('detail-title').textContent = t.client;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${typeLabels[t.type]}</span></div>
    <div class="detail-row"><span class="detail-label">Task</span><span class="detail-value">${esc(t.task)}</span></div>
    <div class="detail-row"><span class="detail-label">Due Date</span><span class="detail-value">${formatDate(t.due)}</span></div>
    <div class="detail-row"><span class="detail-label">Priority</span><span class="detail-value" style="text-transform:capitalize">${t.priority}</span></div>
    ${t.notes ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value" style="max-width:60%;word-break:break-word;text-align:right">${esc(t.notes)}</span></div>` : ''}
    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${t.done ? '✅ Completed' : '🔵 Open'}</span></div>
    <div style="height:16px;"></div>
    <button class="save-btn" onclick="openEdit('${t.id}')">✏️ Edit Task</button>
    <button onclick="toggleDone('${t.id}');closeModal('detailModal')" style="width:100%;padding:13px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-weight:700;color:${t.done ? 'var(--amber)' : 'var(--green)'};background:white;cursor:pointer;margin-top:10px;">${t.done ? '↩ Reopen Task' : '✓ Mark Complete'}</button>
  `;
  openModal('detailModal');
}

// ── SETTINGS ──
function openSettings() {
  document.getElementById('webhook-url').value = settings.webhookUrl || '';
  document.getElementById('settings-name').value = settings.name || '';
  updateWebhookChip();
  openModal('settingsModal');
}

function saveSettings() {
  settings.webhookUrl = document.getElementById('webhook-url').value.trim();
  settings.name = document.getElementById('settings-name').value.trim();
  localStorage.setItem('scw_settings', JSON.stringify(settings));
  updateWebhookChip();
  closeModal('settingsModal');
  showToast('Settings saved');
}

function updateWebhookChip() {
  const chip = document.getElementById('webhook-status-chip');
  if (settings.webhookUrl) {
    chip.textContent = 'Configured';
    chip.className = 'webhook-status connected';
  } else {
    chip.textContent = 'Not configured';
    chip.className = 'webhook-status disconnected';
  }
}

async function testWebhook() {
  const url = document.getElementById('webhook-url').value.trim();
  if (!url) { showToast('Enter a webhook URL first', 'error'); return; }
  try {
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'test', message: 'SCW Task Manager connected successfully', adviser: settings.name || 'Sean', timestamp: new Date().toISOString() })
    });
    showToast('Test sent to Zapier');
  } catch(e) { showToast('Webhook test failed', 'error'); }
}

function clearAllData() {
  if (!confirm('Delete ALL tasks? This cannot be undone.')) return;
  tasks = [];
  save();
  render();
  closeModal('settingsModal');
  showToast('All tasks cleared');
}

// ── PERSISTENCE ──
function save() {
  localStorage.setItem('scw_tasks', JSON.stringify(tasks));
}

// ── MODALS ──
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) {
    closeModal(e.target.id);
  }
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✓  ' : '✕  ') + msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
updateWebhookChip();
render();
</script>
</body>
</html>
